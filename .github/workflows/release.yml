name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos
            os: macos-latest
            artifact: BookUnbind-macos.zip
          - platform: windows
            os: windows-latest
            artifact: BookUnbind-windows.zip
          - platform: linux
            os: ubuntu-latest
            artifact: BookUnbind-linux.tar.gz

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.4'
          channel: stable

      - name: Link Flutter for flet CLI
        shell: bash
        run: |
          mkdir -p "$HOME/flutter"
          rm -rf "$HOME/flutter/3.41.4"
          ln -s "$FLUTTER_ROOT" "$HOME/flutter/3.41.4" || cp -r "$FLUTTER_ROOT" "$HOME/flutter/3.41.4"

      - name: Install Linux system deps
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libgtk-3-dev

      - name: Install Python deps
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build Flet app
        shell: bash
        env:
          PYTHONIOENCODING: utf-8
          PYTHONUTF8: '1'
        run: |
          flet build ${{ matrix.platform }} \
            --project BookUnbind --product BookUnbind \
            --exclude .venv build local_samples tests .pytest_cache .claude .git

      - name: Package macOS .app
        if: matrix.platform == 'macos'
        run: |
          cd build/macos
          ditto -c -k --sequesterRsrc --keepParent BookUnbind.app ../../${{ matrix.artifact }}

      - name: Package Windows build
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          # Compress-Archive drops hidden files/empty dirs and mangles the
          # Flet app bundle under data/flutter_assets/app. Use 7-Zip (which
          # ships on windows-latest runners) to preserve the layout.
          Write-Host "==== build/windows contents ===="
          Get-ChildItem -Recurse build/windows | Select-Object FullName, Length | Format-Table -AutoSize | Out-String -Width 4096
          & "$env:ProgramFiles\7-Zip\7z.exe" a -tzip -mx=5 ${{ matrix.artifact }} .\build\windows\*
          Write-Host "==== ${{ matrix.artifact }} contents ===="
          & "$env:ProgramFiles\7-Zip\7z.exe" l ${{ matrix.artifact }} | Out-String -Width 4096

      - name: Build Windows installer (Inno Setup)
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          # Strip the leading "v" from e.g. refs/tags/v0.2.4; fall back to 0.0.0
          # for non-tag runs (workflow_dispatch) so the installer still builds.
          $ref = "${{ github.ref_name }}"
          if ($ref -match '^v(\d+\.\d+\.\d+)$') { $ver = $Matches[1] } else { $ver = "0.0.0" }
          Write-Host "Installer version: $ver"
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          & $iscc "/DAppVersion=$ver" "installer\BookUnbind.iss"
          Write-Host "==== dist\ contents ===="
          Get-ChildItem dist | Format-Table -AutoSize
          # Expose the produced installer path to later steps
          $setup = Get-ChildItem dist\BookUnbind-Setup-*.exe | Select-Object -First 1
          "installer_path=$($setup.FullName)" | Out-File -Append -FilePath $env:GITHUB_ENV
          "installer_name=$($setup.Name)"     | Out-File -Append -FilePath $env:GITHUB_ENV

      - name: Package Linux build
        if: matrix.platform == 'linux'
        run: |
          tar czf ${{ matrix.artifact }} -C build/linux .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}
          if-no-files-found: error

      - name: Upload Windows installer
        if: matrix.platform == 'windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.installer_name }}
          path: ${{ env.installer_path }}
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Show artifacts
        run: ls -lh dist

      - name: Ensure changelog file exists for this tag
        run: |
          file="changelog/${{ github.ref_name }}.md"
          if [ ! -f "$file" ]; then
            echo "::error::Missing $file. Create it before tagging."
            exit 1
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          tag_name: ${{ github.ref_name }}
          name: BookUnbind ${{ github.ref_name }}
          body_path: changelog/${{ github.ref_name }}.md
          fail_on_unmatched_files: true
